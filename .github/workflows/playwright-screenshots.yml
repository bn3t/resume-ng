name: Playwright Integration Tests Screenshots

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate screenshot snapshots and commit them'
        type: boolean
        default: false

jobs:
  test-screenshots:
    timeout-minutes: 60
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots == true }}
        run: npm run test:screenshots
      - name: Update snapshots
        if: always() && github.event_name == 'workflow_dispatch' && inputs.update_snapshots
        run: npm run test:screenshots -- --update-snapshots
      - name: Commit updated snapshots
        if: always() && github.event_name == 'workflow_dispatch' && inputs.update_snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests-screenshots/
          git diff --staged --quiet || git commit -m "test(screenshots): update baseline snapshots [skip ci]"
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-screenshots
          path: playwright-report-screenshots/
          retention-days: 3
